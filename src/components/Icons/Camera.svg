<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Subtle breathing effect for the whole camera */
    .camera-body {
      animation: breathe 4s ease-in-out infinite;
      transform-origin: center;
    }
    
    /* Pulsing red record light */
    .rec-light {
      animation: pulse-red 1.5s infinite;
    }
    
    /* Autofocus lens movement */
    .lens-focus {
      animation: focus 3s ease-in-out infinite;
      transform-origin: center;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    @keyframes pulse-red {
      0%, 100% { opacity: 1; fill: #ff4d4d; }
      50% { opacity: 0.3; fill: #ff0000; }
    }

    @keyframes focus {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; }
    }
  </style>

  <!-- Camera Body -->
  <g class="camera-body">
    <!-- Main Chassis -->
    <rect x="40" y="70" width="120" height="80" rx="12" fill="#2d2d2d" />
    <path d="M70 70 L80 50 L120 50 L130 70 Z" fill="#1a1a1a" />
    
    <!-- Viewfinder Area -->
    <rect x="85" y="45" width="30" height="15" rx="3" fill="#333" />
    
    <!-- Record Light -->
    <circle class="rec-light" cx="145" cy="85" r="3" />
    
    <!-- Lens Housing -->
    <circle cx="100" cy="110" r="45" fill="#1a1a1a" stroke="#444" stroke-width="2" />
    
    <!-- Animated Lens Glass -->
    <g class="lens-focus">
      <circle cx="100" cy="110" r="30" fill="radial-gradient(circle, #3a3a3a, #000)" stroke="#555" stroke-width="1" />
      <circle cx="100" cy="110" r="20" fill="#0c1a2b" opacity="0.9" />
      <!-- Reflection Shine -->
      <path d="M105 95 Q 115 100 110 115" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.3" />
    </g>
    
    <!-- Shutter Button -->
    <rect x="50" y="62" width="15" height="8" rx="2" fill="#444" />
  </g>
</svg>
